<html>
    <head>
        <title>Calculator</title>
        <link rel="stylesheet" type="text/css" href="style.css">
        <script src ="javascript.js" defer></script>
    </head>
    <body>
        <div id = "calculator">
            <div id = "screen"></div>
            <div class = "row">
                <button class="normalbutton number">1</button>
                <button class="normalbutton number">2</button>
                <button class="normalbutton number">3</button>
            </div>
            <div class = "row">
                <button class="normalbutton number">4</button>
                <button class="normalbutton number">5</button>
                <button class="normalbutton number">6</button>
            </div>
            <div class = "row">
                <button class="normalbutton number">7</button>
                <button class="normalbutton number">8</button>
                <button class="normalbutton number">9</button>
            </div>
            <div class = "row">
                <button class="normalbutton operator">+</button>
                <button class="normalbutton number">0</button>
                <button class="normalbutton operator">-</button>
            </div>
            <div class = "row">
                <button class="normalbutton operator">x</button>
                <button class="normalbutton operator">÷</button>
                <button class="normalbutton deletion">←</button>
            </div>
            <div class = "row">
                <button id="AC" class = "deletion">AC</button>
            </div>
        </div>
    </body>
</html>
